<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="background">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <main class="app">
    <header class="header">
      <div class="header-icon" aria-hidden="true">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
      </div>
      <h1>我的待办</h1>
      <p class="subtitle">整理任务，专注当下</p>
    </header>

    <section class="input-section">
      <form id="todo-form" class="todo-form" autocomplete="off">
        <div class="form-row">
          <input
            type="text"
            id="todo-input"
            class="todo-input"
            placeholder="添加新任务…"
            maxlength="200"
            aria-label="新任务内容"
          />
          <button type="submit" class="btn-add" aria-label="添加任务">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
        </div>
        <div class="form-row form-row-deadline">
          <label class="deadline-label" for="todo-deadline">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
            截止时间
          </label>
          <input
            type="datetime-local"
            id="todo-deadline"
            class="todo-deadline-input"
            aria-label="截止时间"
          />
        </div>
      </form>
    </section>

    <section class="stats-bar" id="stats-bar" hidden>
      <span id="remaining-count">0 项待完成</span>
      <span id="completed-count">0 项已完成</span>
    </section>

    <section class="filters" id="filters" hidden>
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="active">进行中</button>
      <button class="filter-btn" data-filter="completed">已完成</button>
    </section>

    <ul id="todo-list" class="todo-list" aria-label="待办列表"></ul>

    <div id="empty-state" class="empty-state">
      <div class="empty-icon" aria-hidden="true">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M9 12l2 2 4-4"/>
        </svg>
      </div>
      <p>还没有任务</p>
      <span>在上方输入框添加你的第一个待办吧</span>
    </div>

    <footer class="footer" id="footer" hidden>
      <button id="clear-completed" class="btn-clear">清除已完成</button>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
